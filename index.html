<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aishat Suarau — VA Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --dark-bg: #2a1f1b;
      --dark-bg-2: #231a17;
      --warm-white: #fffef9;
      --light-border: rgba(139, 94, 82, 0.18);
      --rose: #c4907a;
      --deep-rose: #8b5e52;
      --blush: #e8d5c4;
      --heading-on-dark: #f0e6df;
      --sub-on-dark: #c2aea5;
      --charcoal: #2c2420;
      --mid: #4a3b37;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark-bg);
      color: var(--heading-on-dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      font-size: 15px;
    }

    .top-stripe { background: var(--rose); height: 4px; width: 100%; }

    /* HERO */
    .hero {
      background: var(--warm-white);
      padding: 64px 0 0;
      border-bottom: 1px solid var(--light-border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,144,122,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* FIXED: removed grid space issue */
    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 32px;
      display: block;
    }

    .hero-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 18px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 76px);
      font-weight: 300;
      line-height: 1.0;
      color: var(--charcoal);
      margin-bottom: 14px;
    }

    .hero-name em { font-style: italic; color: var(--deep-rose); }

    .hero-role {
      font-size: 14px;
      font-weight: 600;
      color: var(--charcoal);
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .pill {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--deep-rose);
      border: 1px solid var(--rose);
      border-radius: 100px;
      padding: 4px 14px;
      background: rgba(196,144,122,0.08);
    }

  </style>
</head>

<body>

<div class="top-stripe"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">

    <span class="hero-tag">Professional Portfolio</span>

    <h1 class="hero-name">
      Aishat<br><em>Suarau</em>
    </h1>

    <p class="hero-role">
      Personal Assistant &nbsp;·&nbsp; Virtual Assistant
    </p>

    <div class="hero-pills">
      <span class="pill">Administrative Support</span>
      <span class="pill">Client Communication</span>
      <span class="pill">Brand Support</span>
      <span class="pill">Social Media Assistance</span>
    </div>

  </div>
</section>

</body>
</html>

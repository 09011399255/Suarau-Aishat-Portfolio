<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aishat Suarau — VA Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --dark-bg: #2a1f1b;
      --dark-bg-2: #231a17;
      --warm-white: #fffef9;
      --light-border: rgba(139, 94, 82, 0.18);
      --rose: #c4907a;
      --deep-rose: #8b5e52;
      --blush: #e8d5c4;
      --heading-on-dark: #f0e6df;
      --sub-on-dark: #c2aea5;
      --charcoal: #2c2420;
      --mid: #4a3b37;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark-bg);
      color: var(--heading-on-dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      font-size: 15px;
    }

    .top-stripe { background: var(--rose); height: 4px; width: 100%; }

    /* HERO */
    .hero {
      background: var(--warm-white);
      padding: 64px 0;
      border-bottom: 1px solid var(--light-border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,144,122,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      flex-direction: column;
      text-align: center;
      align-items: center;
    }

    .hero-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 18px;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 7vw, 76px);
      font-weight: 300;
      line-height: 1.0;
      color: var(--charcoal);
      margin-bottom: 14px;
    }

    .hero-name em { font-style: italic; color: var(--deep-rose); }

    .hero-role {
      font-size: 14px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 28px;
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .pill {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--deep-rose);
      border: 1px solid var(--rose);
      border-radius: 100px;
      padding: 4px 14px;
      background: rgba(196,144,122,0.08);
    }

    /* Sections (unchanged) */
    .section { max-width: 820px; margin: 0 auto; padding: 56px 32px; }
    .section-dark  { background: var(--dark-bg); border-top: 1px solid rgba(196,144,122,0.12); }
    .section-dark2 { background: var(--dark-bg-2); border-top: 1px solid rgba(196,144,122,0.12); }
    .section-light { background: var(--warm-white); border-top: 1px solid var(--light-border); }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(196,144,122,0.22);
    }

    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 400;
      color: #f0e6df;
      margin-bottom: 20px;
    }

    .section-heading em { font-style: italic; color: var(--rose); }

    .section-light .section-heading { color: var(--charcoal); }
    .section-light .section-heading em { color: var(--deep-rose); }

    .body-text { font-size: 15px; line-height: 1.85; max-width: 600px; color: #c2aea5; }
    .section-light .body-text { color: var(--mid); }

    /* (rest unchanged — skills, exp, services, etc.) */
  </style>
</head>

<body>

<div class="top-stripe"></div>

<!-- HERO (IMAGE REMOVED CLEANLY) -->
<section class="hero">
  <div class="hero-inner">
    <span class="hero-tag">Professional Portfolio</span>
    <h1 class="hero-name">Aishat <em>Suarau</em></h1>
    <p class="hero-role">Personal Assistant · Virtual Assistant</p>

    <div class="hero-pills">
      <span class="pill">Administrative Support</span>
      <span class="pill">Client Communication</span>
      <span class="pill">Brand Support</span>
      <span class="pill">Social Media Assistance</span>
    </div>
  </div>
</section>

<!-- EVERYTHING ELSE STAYS EXACTLY THE SAME -->
